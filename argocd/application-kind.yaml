apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloud-native-microservice
  namespace: argocd
spec:
  project: cloud-native-microservice
  source:
    repoURL: https://github.com/tukue/azure-dotnetservice.git
    targetRevision: HEAD
    path: deploy/k8s/overlays/kind
  destination:
    server: https://kubernetes.default.svc
    namespace: cloud-native-microservice
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PruneLast=true
      - ApplyOutOfSyncOnly=true
    retry:
      limit: 2
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    - group: apps
      kind: Deployment
      jsonPointers:
        - /spec/replicas
