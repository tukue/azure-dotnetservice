apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cloud-native-microservice-kind

resources:
  - ../../base

labels:
  - pairs:
      environment: local
    includeSelectors: true

replicas:
  - name: cloud-native-microservice
    count: 1

images:
  - name: cloud-native-microservice
    newName: cloud-native-microservice
    newTag: local
