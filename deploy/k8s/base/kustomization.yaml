apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
metadata:
  name: cloud-native-microservice

resources:
  - namespace.yaml
  - deployment.yaml
  - service.yaml

labels:
  - pairs:
      app.kubernetes.io/name: cloud-native-microservice
      app.kubernetes.io/instance: cloud-native-microservice
      app.kubernetes.io/component: api
      app.kubernetes.io/part-of: azure-dotnetservice
      app.kubernetes.io/managed-by: kustomize
    includeSelectors: true
