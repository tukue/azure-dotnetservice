version: "3.9"

services:
  microservice:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cloud-native-microservice
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 15s
      timeout: 5s
      retries: 3
