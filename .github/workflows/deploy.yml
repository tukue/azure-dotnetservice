name: Build and Deploy to AKS

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      gitops:
        description: 'GitOps mode — skip direct deploy, only build + push + update manifest'
        required: true
        default: false
        type: boolean

env:
  DOTNET_VERSION: '8.0.x'
  IMAGE_NAME: cloud-native-microservice
  NAMESPACE: cloud-native-microservice

jobs:
  # ── Infrastructure security scan (tfsec) ──────────────
  tfsec-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run tfsec
        uses: aquasecurity/tfsec-action@v1.0.3
        with:
          working-directory: infra/terraform
          format: sarif
          output-file: tfsec-results.sarif
          soft_fail: false

      - name: Upload tfsec SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: tfsec-results.sarif
          category: tfsec

  # ── Infrastructure security scan (checkov) ────────────
  checkov-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: infra/terraform
          config_file: infra/terraform/.checkov.yaml
          soft_fail: false
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload checkov SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: checkov-results.sarif
          category: checkov

  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore src/CloudNativeMicroservice/CloudNativeMicroservice.csproj

      - name: Build
        run: dotnet build src/CloudNativeMicroservice/CloudNativeMicroservice.csproj -c Release --no-restore

      - name: Test
        run: dotnet test src/CloudNativeMicroservice/CloudNativeMicroservice.csproj -c Release --no-build --verbosity normal

      - name: Publish
        run: dotnet publish src/CloudNativeMicroservice/CloudNativeMicroservice.csproj -c Release -o publish

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: app
          path: publish/

  containerize-and-push:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} ${{ env.IMAGE_NAME }}:latest
          echo "Image built: ${{ env.IMAGE_NAME }}:${{ github.sha }}"

      - name: Push to ACR
        if: secrets.ACR_LOGIN_SERVER != ''
        run: |
          az acr login --name ${{ secrets.ACR_LOGIN_SERVER }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker tag ${{ env.IMAGE_NAME }}:${{ github.sha }} \
            ${{ secrets.ACR_LOGIN_SERVER }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.ACR_LOGIN_SERVER }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}.azurecr.io/${{ env.IMAGE_NAME }}:latest

      - name: Dry-run notice (no ACR credentials)
        if: secrets.ACR_LOGIN_SERVER == ''
        run: |
          echo "::warning::No ACR credentials — skipping registry push."
          echo "Image: ${{ env.IMAGE_NAME }}:${{ github.sha }}"

  # ── GitOps: update image tag for ArgoCD/Flux sync ──
  update-gitops-manifest:
    needs: containerize-and-push
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.ACR_LOGIN_SERVER != ''
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Update image tag in Kustomize prod overlay
        run: |
          sed -i "s|newTag:.*|newTag: ${{ github.sha }}|g" \
            deploy/k8s/overlays/prod/kustomization.yaml

      - name: Commit manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add deploy/k8s/overlays/prod/kustomization.yaml
          git diff --staged --quiet || \
            git commit -m "chore(release): update image tag to ${{ github.sha }}"
          git push

  # ── Direct deploy mode (non-GitOps, backward compat) ──
  deploy-to-aks:
    needs: containerize-and-push
    if: |
      github.ref == 'refs/heads/main' &&
      secrets.ACR_LOGIN_SERVER != '' &&
      secrets.AKS_CLUSTER_NAME != '' &&
      secrets.AZURE_CREDENTIALS != '' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.gitops != 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set AKS context
        run: |
          az aks get-credentials \
            --resource-group ${{ secrets.AKS_RESOURCE_GROUP }} \
            --name ${{ secrets.AKS_CLUSTER_NAME }} \
            --overwrite-existing

      - name: Deploy with Kustomize
        run: |
          kustomize build deploy/k8s/overlays/prod | kubectl apply -f -
          kubectl rollout status deployment/${{ env.IMAGE_NAME }} \
            -n ${{ env.NAMESPACE }} --timeout=180s

  # ── Summary ─────────────────────────────────────────
  dry-run-summary:
    needs: [build-and-test, containerize-and-push]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Deployment summary
        run: |
          echo "══════════════════════════════════════════════"
          echo "  CI/CD Pipeline Summary"
          echo "══════════════════════════════════════════════"
          echo "  Image:      ${{ env.IMAGE_NAME }}:${{ github.sha }}"
          echo "  Namespace:  ${{ env.NAMESPACE }}"
          echo "  Branch:     ${{ github.ref }}"
          echo "  Event:      ${{ github.event_name }}"
          echo ""
          echo "  Kustomize overlays:"
          echo "    dev:  deploy/k8s/overlays/dev"
          echo "    prod: deploy/k8s/overlays/prod"
          echo "    kind: deploy/k8s/overlays/kind"
          echo ""
          echo "  To deploy locally with Kind:"
          echo "    make kind-demo"
          echo ""
          echo "  For Gitops with ArgoCD/Flux:"
          echo "    Point operator at: deploy/k8s/overlays/prod"
          echo "══════════════════════════════════════════════"
